<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Payment cancelled | PathyCode</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.08), 0 2px 4px -2px rgba(15, 23, 42, 0.05);
            border: 1px solid #e2e8f0;
            max-width: 440px;
            width: 100%;
            text-align: center;
            padding: 2.5rem 2rem;
        }
        .icon-wrap {
            width: 72px;
            height: 72px;
            margin: 0 auto 1.5rem;
            background: #fef3c7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-wrap svg {
            width: 40px;
            height: 40px;
            color: #d97706;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }
        .sub {
            font-size: 0.9375rem;
            color: #64748b;
            line-height: 1.5;
            margin-bottom: 1.75rem;
        }
        .cta {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #0d9488;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9375rem;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .cta:hover {
            background: #0f766e;
        }
        .breadcrumb {
            font-size: 0.8125rem;
            color: #94a3b8;
            margin-top: 1.5rem;
        }
        .breadcrumb a {
            color: #0d9488;
            text-decoration: none;
        }
        .breadcrumb a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-wrap">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/>
            </svg>
        </div>
        <h1>Payment cancelled</h1>
        <p class="sub">You can complete payment later from your profile or portal when you’re ready.</p>
        <a href="{{ frontend_url }}{{ portal_path }}" class="cta">Back to Portal</a>
        <p class="breadcrumb">
            <a href="{{ frontend_url }}{{ home_path }}">Home</a> · <a href="{{ frontend_url }}{{ profile_path }}">Profile</a>
        </p>
    </div>
</body>
</html>
